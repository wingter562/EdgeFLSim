<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Socket.IO 测试</title>
    <script src="{{ url_for('static', filename='js/socket.io.min.js') }}"></script>
</head>
<body>
    <h1>Socket.IO 连接测试</h1>
    <p>状态：<span id="status">未连接</span></p>
    <div id="log"></div>
    <button onclick="location.reload()">刷新页面</button>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var socket = io({ transports: ['polling'] });
            socket.on('connect', function() {
                console.log('✅ 连接成功');
                document.getElementById('status').innerText = '连接成功';
            });
            socket.on('disconnect', function() {
                console.log('❌ 连接断开');
                document.getElementById('status').innerText = '连接断开';
            });
            socket.on('connect_error', function(err) {
                console.error('连接错误:', err);
                document.getElementById('status').innerText = '连接错误: ' + err.message;
            });
            socket.on('round_update', function(data) {
                console.log('收到 round_update:', data);
                document.getElementById('log').innerHTML = '收到数据：' + JSON.stringify(data);
            });
        });
    </script>
</body>
</html>
